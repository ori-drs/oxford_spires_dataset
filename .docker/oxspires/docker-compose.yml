version: '3'

services:
  oxspires_utils:
    build:
      context: ../..
      dockerfile: .docker/oxspires/Dockerfile
      target: dev
      args:
        - USERNAME=${USERNAME}
        - UID=${UID}
        - GID=${GID}
        - DOCKER_HOME_DIR=${DOCKER_HOME_DIR}
        - DOCKER_WORKDIR=${DOCKER_WORKDIR}
    runtime: nvidia
    stdin_open: true
    tty: true
    volumes:
      - ../../scripts:${DOCKER_WORKDIR}/scripts
      - ../../configs:${DOCKER_WORKDIR}/configs
      - ../../data:${DOCKER_WORKDIR}/data
      - ../../Taskfile.yml:${DOCKER_WORKDIR}/Taskfile.yml
